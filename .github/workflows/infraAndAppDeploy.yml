# Make sure not to name your pipeline deploy, as this will conflict with the built-in deploy action
name: deploy infra and app using github functions
on:
  workflow_dispatch:
  push:
    branches:
      - main
env:
  AZURE_RESOURCE_GROUP: ${{ 'AiCodingFromYourPhone' }}
  AZURE_LOCATION: ${{ 'eastus2' }}
  AZURE_STATIC_WEB_APP_NAME: ${{ 'coding-from-your-phone' }}
  INFRA_TEMPLATE_PATH: ./infra/main.bicep
  INFRA_DEPLOYMENT_NAME: app-infra-deployment
  WEBSITE_ARTIFACT_NAME: website
  WEBSITE_BUILD_PATH: code/ui/my-react-app/dist/
  NODE_VERSION: "24.x"
jobs:
  build-infrastructure:
    name: build infrastructure
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: Log in to Azure
        run: |
          az login --service-principal -u ${{ secrets.AZURE_PIPELINE_APP_ID }} -p ${{ secrets.AZURE_PIPELINE_PASSWORD }} --tenant ${{ secrets.AZURE_PIPELINE_TENANT }}
          az account set --subscription ${{ secrets.AZURE_PIPELINE_SUBSCRIPTION_ID }}
          # generate credentials using this command, then store them in GitHub secrets
          # az ad sp create-for-rbac --name "pipelineCredentials" --role contributor --scopes /subscriptions/{subscription-id}/resourceGroups/{resource-group} 


      - name: build infrastructure
        run: |
          az deployment group create \
            --name "${{ env.INFRA_DEPLOYMENT_NAME }}" \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --template-file "${{ env.INFRA_TEMPLATE_PATH }}" \
            --parameters location="${{ env.AZURE_LOCATION }}" \
            --parameters webAppName="${{ env.AZURE_STATIC_WEB_APP_NAME }}"

  build-app:
    name: build react app
    needs: build-infrastructure
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: Use node.js ${{env.NODE_VERSION}}
        uses: actions/setup-node@v6
        with:
          node-version: ${{env.NODE_VERSION}}

      - name: npm install and build
        run: |
          cd code/ui/my-react-app
          npm install
          npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.WEBSITE_ARTIFACT_NAME }}
          path: ${{ env.WEBSITE_BUILD_PATH }}

  deploy-app:
    name: deploy static web app
    needs: build-app
    runs-on: ubuntu-latest
    steps:
      - name: downloading artifact
        uses: actions/download-artifact@v7
        with:
          name: ${{ env.WEBSITE_ARTIFACT_NAME }}
          path: website

      - name: Log in to Azure
        run: |
          az login --service-principal -u ${{ secrets.AZURE_PIPELINE_APP_ID }} -p ${{ secrets.AZURE_PIPELINE_PASSWORD }} --tenant ${{ secrets.AZURE_PIPELINE_TENANT }}
          az account set --subscription ${{ secrets.AZURE_PIPELINE_SUBSCRIPTION_ID }}

      - name: get static web app deployment token
        id: get-swa-token
        run: |
          token=$(az staticwebapp secrets list \
            --name "${{ env.AZURE_STATIC_WEB_APP_NAME }}" \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --query "properties.apiKey" -o tsv)
          echo "SWA_TOKEN=$token" >> $GITHUB_ENV

      - name: deploy to azure static web app
        id: deploy-to-static-web-app
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ env.SWA_TOKEN }}
          action: upload
          app_location: .
          output_location: website
          skip_app_build: true